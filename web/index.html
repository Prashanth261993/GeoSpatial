<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seattle Live — Geospatial</title>
    <style>
      html, body, #root { margin: 0; height: 100%; background: #0b0e14; }
      .panel { color: #cdd6f4;
        font: 13px ui-monospace, "Cascadia Code", monospace; background: #11131aee;
        padding: 10px 14px; border-radius: 10px; border: 1px solid #1f2430; }
      #hud { position: absolute; z-index: 1; top: 12px; left: 12px; }
      #hud b { color: #89dceb; }
      #rightcol { position: absolute; z-index: 1; top: 12px; right: 12px;
        display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
      #stats { min-width: 210px; }
      #stats .row { display: flex; justify-content: space-between; gap: 18px; margin: 3px 0; }
      #stats .k { color: #8b93a7; }
      #stats .v { color: #89dceb; font-weight: 700; }
      #stats h4 { margin: 0 0 8px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #b4befe; }
      #toggles { display: flex; gap: 14px; }
      #toggles label { cursor: pointer; }
      #airbar #air { color: #b4befe; }
      #legend { position: absolute; z-index: 1; bottom: 12px; left: 12px; display: flex; gap: 16px; flex-wrap: wrap; max-width: 60vw; }
      #legend span { display: flex; align-items: center; gap: 6px; }
      #legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
      #tooltip { position: absolute; z-index: 2; pointer-events: none; display: none;
        background: #0b0e14f2; color: #cdd6f4; border: 1px solid #2a3346; border-radius: 8px;
        padding: 8px 10px; font: 12px ui-monospace, monospace; box-shadow: 0 8px 24px -8px #000; }
      #tooltip b { color: #89dceb; }
      .tool { background: #171a24; color: #cdd6f4; border: 1px solid #2a3346; border-radius: 8px;
        padding: 6px 10px; font: 12px ui-monospace, monospace; cursor: pointer; }
      .tool.active { background: linear-gradient(100deg, #89dceb, #b4befe); color: #06080d; border-color: transparent; font-weight: 700; }
      #sliders .srow { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
      #sliders .srow span { color: #8b93a7; width: 66px; }
      #sliders .srow b { color: #89dceb; width: 52px; text-align: right; }
      #sliders input[type=range] { flex: 1; accent-color: #89dceb; }
      #viewnav { position: absolute; z-index: 3; bottom: 12px; left: 50%; transform: translateX(-50%);
        color: #cdd6f4; text-decoration: none; font: 12px ui-monospace, monospace; letter-spacing: 1px;
        background: #11131aee; border: 1px solid #2a3346; border-radius: 999px; padding: 8px 18px; }
      #viewnav:hover { border-color: #89dceb; color: #89dceb; }
      body.cinematic #ops-ui { display: none; }
      body.cinematic #viewnav { display: none; }
      .cine-vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(ellipse 75% 70% at 50% 45%, transparent 40%, #04060bcc 100%); }
      .cine-hud { position: absolute; z-index: 3; top: 28px; left: 34px; pointer-events: none; }
      .cine-title { font: 700 30px/1 "Inter", system-ui, sans-serif; letter-spacing: 4px; color: #eaf6ff;
        text-shadow: 0 0 18px #59d6ff88; }
      .cine-title span { color: #59d6ff; }
      .cine-sub { margin-top: 8px; font: 12px ui-monospace, monospace; letter-spacing: 2px; color: #8bb6c8; text-transform: uppercase; }
      .cine-back { position: absolute; z-index: 3; top: 30px; right: 34px; color: #8bb6c8; text-decoration: none;
        font: 12px ui-monospace, monospace; letter-spacing: 1px; border: 1px solid #1f3340; border-radius: 999px; padding: 8px 16px; background: #08111788; }
      .cine-back:hover { color: #59d6ff; border-color: #59d6ff; }
    </style>
  </head>
  <body>
    <div id="ops-ui">
    <div id="hud" class="panel">Seattle drivers: <b id="count">0</b><br /><span id="near" style="color:#a6adc8">click the map to find nearby drivers</span></div>
    <div id="rightcol">
      <div id="stats" class="panel">
        <h4>Matching · <span id="mode">greedy</span></h4>
        <div class="row"><span class="k">active trips</span><span class="v" id="active">0</span></div>
        <div class="row"><span class="k">waiting riders</span><span class="v" id="waiting">0</span></div>
        <div class="row"><span class="k">total assigned</span><span class="v" id="assigned">0</span></div>
        <div class="row"><span class="k">avg pickup</span><span class="v" id="avg">—</span></div>
      </div>
      <div id="toggles" class="panel">
        <label><input type="checkbox" id="tgl-ops" checked /> ops</label>
        <label><input type="checkbox" id="tgl-surge" /> surge</label>
        <label><input type="checkbox" id="tgl-air" /> ✈ aircraft</label>
      </div>
      <div id="tools" class="panel">
        <div style="font-size:11px;letter-spacing:1px;color:#8b93a7;text-transform:uppercase;margin-bottom:6px">click tool</div>
        <div style="display:flex;gap:6px">
          <button id="tool-nearby" class="tool active">🔍 nearby</button>
          <button id="tool-spawn" class="tool">🧍 spawn rider</button>
        </div>
      </div>
      <div id="sliders" class="panel">
        <div class="srow"><span>drivers</span><input type="range" id="sl-drivers" min="0" max="400" value="200" /><b id="sl-drivers-v">200</b></div>
        <div class="srow"><span>rider rate</span><input type="range" id="sl-rate" min="100" max="3000" step="100" value="700" /><b id="sl-rate-v">700ms</b></div>
      </div>
      <div id="airbar" class="panel"><span id="air">toggle ✈ to stream real aircraft</span></div>
    </div>
    <div id="legend" class="panel">
      <span><i style="background:#89dceb"></i>driver</span>
      <span><i style="background:#f9e2af"></i>waiting rider</span>
      <span><i style="background:#f5c2e7"></i>on trip</span>
      <span><i style="background:#b4befe"></i>aircraft</span>
    </div>
    <div id="tooltip"></div>
    </div>
    <a id="viewnav" href="#/cinematic">✦ cinematic</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
