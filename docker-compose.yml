name: geospatial

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  timescale:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_DB: geo
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo"]
      interval: 10s
      timeout: 5s
      retries: 10

  # OSRM (Phase 1) — Seattle/WA routing graph prebuilt in data/osrm (MLD).
  osrm:
    image: osrm/osrm-backend:v5.25.0
    command: osrm-routed --algorithm mld /data/seattle.osrm
    ports: ["5000:5000"]
    volumes: ["./data/osrm:/data"]

  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        rpk topic create positions -p 12 -r 1 --brokers redpanda:9092 || true;
        rpk topic create trips -p 6 -r 1 --brokers redpanda:9092 || true;
        rpk topic create requests -p 12 -r 1 --brokers redpanda:9092 || true;
        echo topics ready
    depends_on:
      redpanda: { condition: service_healthy }
    restart: "no"

  ingest-gateway:
    build:
      context: .
      dockerfile: services/Dockerfile.cgo
      args: { SVC: ingest-gateway }
    environment:
      REDPANDA_BROKERS: redpanda:9092
      PORT: "8080"
    ports: ["8080:8080"]
    depends_on:
      redpanda: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }

  ws-fanout:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SVC: ws-fanout }
    environment:
      REDPANDA_BROKERS: redpanda:9092
      PORT: "8090"
    ports: ["8090:8090"]
    depends_on:
      redpanda: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }

  indexer:
    build:
      context: .
      dockerfile: services/Dockerfile.cgo
      args: { SVC: indexer }
    environment:
      REDIS_ADDR: redis:6379
      REDPANDA_BROKERS: redpanda:9092
      PORT: "8100"
      H3_RES: "9"
    ports: ["8100:8100"]
    depends_on:
      redis: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }

  matcher:
    build:
      context: .
      dockerfile: services/Dockerfile.cgo
      args: { SVC: matcher }
    environment:
      REDIS_ADDR: redis:6379
      REDPANDA_BROKERS: redpanda:9092
      PORT: "8110"
      NEARBY_URL: http://indexer:8100/nearby
      OSRM_URL: http://osrm:5000
      MATCH_MODE: ${MATCH_MODE:-greedy}
      BATCH_WINDOW_MS: "1000"
    ports: ["8110:8110"]
    depends_on:
      redis: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }

  surge:
    build:
      context: .
      dockerfile: services/Dockerfile.cgo
      args: { SVC: surge }
    environment:
      REDIS_ADDR: redis:6379
      REDPANDA_BROKERS: redpanda:9092
      POSTGRES_DSN: postgres://geo:geo_dev_pw@timescale:5432/geo
      PORT: "8120"
    ports: ["8120:8120"]
    depends_on:
      redis: { condition: service_healthy }
      timescale: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }

  feeds:
    build:
      context: .
      dockerfile: services/Dockerfile.cgo
      args: { SVC: feeds }
    environment:
      REDPANDA_BROKERS: redpanda:9092
      PORT: "8130"
      OPENSKY_ENABLED: ${OPENSKY_ENABLED:-false}
      OPENSKY_USER: ${OPENSKY_USER:-}
      OPENSKY_PASS: ${OPENSKY_PASS:-}
    ports: ["8130:8130"]
    depends_on:
      redpanda-init: { condition: service_completed_successfully }

  simulator:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SVC: simulator }
    environment:
      INGEST_URL: http://ingest-gateway:8080
      DRIVERS: "200"
      OSRM_URL: http://osrm:5000
      MATCHER_URL: http://matcher:8110
      RIDER_RATE_MS: "700"
      PORT: "8140"
    ports: ["8140:8140"]
    depends_on: [ingest-gateway, osrm, matcher]

  web:
    build:
      context: ./web
    environment:
      VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY:-}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8090/ws}
      VITE_NEARBY_URL: ${VITE_NEARBY_URL:-http://localhost:8100/nearby}
      VITE_STATS_URL: ${VITE_STATS_URL:-http://localhost:8110/stats}
      VITE_SURGE_URL: ${VITE_SURGE_URL:-http://localhost:8120/surge}
      VITE_FEEDS_URL: ${VITE_FEEDS_URL:-http://localhost:8130/feeds}
      VITE_MATCHER_URL: ${VITE_MATCHER_URL:-http://localhost:8110/request}
      VITE_SIM_URL: ${VITE_SIM_URL:-http://localhost:8140/control}
    ports: ["8899:5173"]
    depends_on: [ws-fanout]

volumes:
  timescale_data:
