name: geospatial

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  timescale:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_DB: geo
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo"]
      interval: 10s
      timeout: 5s
      retries: 10

  # OSRM (Phase 1) — needs a Seattle OSM extract prebuilt into data/osrm.
  # Deferred until Phase 1 to avoid a large download in scaffolding.
  # osrm:
  #   image: osrm/osrm-backend:v5.27.1
  #   command: osrm-routed --algorithm mld /data/seattle.osrm
  #   ports: ["5000:5000"]
  #   volumes: ["./data/osrm:/data"]

volumes:
  timescale_data:
